name: Build Torroid Desktop App

on:
  workflow_dispatch: # Allows you to manually trigger this build with a button click

jobs:
  build:
    runs-on: windows-latest # Tells GitHub to spin up a virtual Windows machine

    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild (Visual Studio)
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet (Package Manager)
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore Torroid.sln

    - name: Compile Application (Release x64)
      run: msbuild Torroid.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload Built Files
      uses: actions/upload-artifact@v4
      with:
        name: Torroid-Windows-x64
        path: x64/Release/
